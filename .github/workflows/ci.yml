name: DRAKZ CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    # We bring up Redis and MongoDB services for the tests
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
      mongodb:
        image: mongo:6
        ports:
          - 27017:27017

    steps:
    - uses: actions/checkout@v4
    
    - name: Use Node.js 20.x
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci || npm install
      
    - name: Build frontend
      run: npm run build
      
    - name: Run Unit & API Integration Tests
      run: npm run test
      env:
        NODE_ENV: test
        JWT_SECRET: test-super-secret-key
        REDIS_URI: redis://127.0.1.1:6379
        # Assuming you provide a safe fallback DB in tests or mock it
        # Mongoose handles mock/test connects in setup.js if needed
        MONGO_URI: mongodb://127.0.1.1:27017/drakz_test

    - name: Upload Test Report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: vitest-html-report
        path: reports/test-report.html
