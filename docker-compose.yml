version: '3.8'

services:
  app:
    build: .
    container_name: drakz-app
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=development
      # These will be overridden by the .env file if run locally
      - PORT=3001
      - VITE_BACKEND_URL=http://localhost:3001
    env_file:
      - .env
    volumes:
      - ./:/app
      - /app/node_modules
    depends_on:
      - redis
    command: npm run dev

  redis:
    image: redis:7-alpine
    container_name: drakz-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes

volumes:
  redis_data:
